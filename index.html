<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spring Cherry Blossom - 추천 아이템</title>
    <!-- External Stylesheet -->
    <link rel="stylesheet" href="style.css">
    <!-- Pretendard Font -->
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
</head>
<body>

    <!-- 상단 고정 대가성 문구 (Conveyor Belt) -->
    <div class="affiliate-notice-container">
        <div class="affiliate-notice-content" id="scrolling-notice">
            <!-- Content populated by JS for infinite loop -->
        </div>
    </div>

    <!-- 메인 컨텐츠 -->
    <div class="container">
        
        <!-- 프로필 영역 -->
        <header class="profile-section">
            <h1 id="page-title">🌸 봄날의 추천템 🌸</h1>
            <p id="page-subtitle">따뜻한 봄 햇살처럼 화사한 아이템들을 만나보세요.</p>
        </header>

        <!-- 링크 리스트 -->
        <main class="link-list" id="link-list-container">
            <!-- Dynamic Items will be injected here -->
        </main>

        <!-- Admin: Add Item Button (Only visible when logged in) -->
        <div class="add-item-container admin-only">
            <button class="btn-add-item" onclick="adminManager.showAddItemPrompt()">+ 새 상품 추가하기</button>
        </div>

    </div>

    <!-- Hidden Admin Trigger (Bottom Right) -->
    <button class="footer-admin-trigger" onclick="adminManager.toggleLoginModal()" title="Admin Login"></button>

    <!-- Login Modal -->
    <div class="modal-overlay" id="login-modal">
        <div class="modal-content">
            <h2>Admin Login</h2>
            <input type="password" id="admin-password" placeholder="비밀번호를 입력하세요 (기본: 1234)">
            <button onclick="adminManager.login()">로그인</button>
            <button onclick="adminManager.toggleLoginModal()" style="background: #ccc; margin-top: 10px;">취소</button>
        </div>
    </div>

    <!-- External JavaScript -->
    <script src="main.js"></script>
</body>
</html>
